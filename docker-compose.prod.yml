services:
  db:
    image: postgres:17
    environment:
      - POSTGRES_USER=${DB_USERNAME:-streamtube}
      - POSTGRES_PASSWORD=${DB_PASSWORD:-streamtube}
      - POSTGRES_DB=${DB_NAME:-streamtube}
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-streamtube}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER:-streamtube}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD must be set}
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  mailpit:
    # Fake local SMTP — placeholder until a real transactional email provider
    # is wired in; see docs/decisions/technical-decisions-phase-07-home-busca-finalizacao.md TD-02.
    image: axllent/mailpit
    ports:
      - "8025:8025"
    restart: unless-stopped

  nestjs-api:
    build:
      context: ./nestjs-project
      dockerfile: Dockerfile
    env_file:
      - .env.production
    environment:
      - DB_HOST=db
      - REDIS_HOST=redis
      - MINIO_ENDPOINT=minio
      - MAIL_HOST=mailpit
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    restart: unless-stopped

  video-worker:
    build:
      context: ./video-worker
      dockerfile: Dockerfile
    env_file:
      - .env.production
    environment:
      - DB_HOST=db
      - REDIS_HOST=redis
      - MINIO_ENDPOINT=minio
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    restart: unless-stopped

  next-frontend:
    build:
      context: ./next-frontend
      dockerfile: Dockerfile
      args:
        API_URL: http://nestjs-api:3000
    env_file:
      - .env.production
    environment:
      - API_URL=http://nestjs-api:3000
    ports:
      - "3001:3000"
    depends_on:
      - nestjs-api
    restart: unless-stopped

volumes:
  db_data:
  minio_data:
